<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<title>PICXSART</title>
		<style>
			html, body {
				height: 100%;
			}

			body {
				background-color: #000000;
				margin: 0;
				font-family: Helvetica, sans-serif;;
				overflow: hidden;
			}

			a {
				color: #ffffff;
			}

			#info {
				position: absolute;
				width: 100%;
				color: #ffffff;
				padding: 5px;
				font-family: Monospace;
				font-size: 13px;
				font-weight: bold;
				text-align: center;
				z-index: 1;
				overflow: hidden;
			}

			#menu {
				position: absolute;
				bottom: 20px;
				width: 100%;
				text-align: center;
			}

			#menu2 {
				position: absolute;
				left: 55%;
				top: 18%;
				//bottom: 20px;
				//width: 100%;
				text-align: center;
			}
            
            .triangle {
              width: 0;
              height: 0;
              border-left: 450px solid transparent;
              border-right: 200px solid transparent;
              border-bottom: 530px solid rgba(255, 0, 100, .5);
            }
            
            .triangle-right {
              width: 0;
              height: 0;
              border-top: 300px solid transparent;
              border-left: 800px solid rgb(255, 255, 100);
              border-bottom: 300px solid transparent;
            }
			
			.element {
				width: 288px;
				height: 234px;
				box-shadow: 0px 0px 12px rgba(0,255,255,0.5);
				border: 18px solid rgba(0, 0, 0, 1);
				text-align: center;
				cursor: default;
			}

			.element2 {
				width: auto;
				height: auto;
				box-shadow: 0px 0px 12px rgba(0,255,255,0.5);
				//border: 150px solid rgba(255, 255, 255, 1);
				cursor: default;
			}

			.element:hover {
				box-shadow: 0px 0px 12px rgba(0,255,255,0.75);
				border: 1px solid rgba(127,255,255,0.75);
			}

				.element .number {
					position: absolute;
					top: 20px;
					right: 20px;
					font-size: 12px;
					color: rgba(127,255,255,0.75);
				}

				.element .symbol {
					position: absolute;
					top: 40px;
					left: 0px;
					right: 0px;
					font-size: 60px;
					font-weight: bold;
					color: rgba(255,255,255,0.75);
					text-shadow: 0 0 10px rgba(0,255,255,0.95);
				}

				.element .details {
					position: absolute;
					bottom: 15px;
					left: 0px;
					right: 0px;
					font-size: 12px;
					color: rgba(127,255,255,0.75);
				}

			button {
				color: rgba(127,255,255,0.75);
				background: transparent;
				outline: 1px solid rgba(127,255,255,0.75);
				border: 0px;
				padding: 5px 10px;
				cursor: pointer;
			}
			button:hover {
				background-color: rgba(0,255,255,0.5);
			}
			button:active {
				color: #000000;
				background-color: rgba(0,255,255,0.75);
			}
			.button2 {
				color: rgba(255, 127, 127, 0.75);
				background: transparent;
				outline: 1px solid rgba(255, 127, 127, 0.75);
				border: 0px;
				padding: 5px 10px;
				cursor: pointer;
			}
		</style>
	</head>

					botonfavoritos.onclick = function () {
						document.getElementById('salir').style.display = 'block';
						camera.position.x = 900 * Math.sin( 0 * 0.524 + Math.PI )*10;
                        camera.position.y =  ( 2.3 * 280 ) - 450;
                        camera.position.z = 900 * Math.cos( 0 * 0.524 + Math.PI )*10;
						for ( var k = 0; k < 10; k += 1 ) {
							favoritos.fotos[k].className = "element2";
							favoritos.objetos[k].position.x = 900 * Math.sin( k/5 * 0.524 + Math.PI )*5.5;
                        	favoritos.objetos[k].position.y =  ( 2 * 280 ) - 450;
                        	favoritos.objetos[k].position.z = 900 * Math.cos( k/5 * 0.524 + Math.PI )*5.5;
							favoritos.objetos[k].lookAt( 900 * Math.sin( k/5 * 0.524 + Math.PI )*50, ( 2 * 280 ) - 450, 900 * Math.cos( k/5 * 0.524 + Math.PI )*50 );
						};
					};

					botonsalir.onclick = function () {
						botonsalir.style.display = "none";

						for ( var k = 0; k < 10; k += 1 ) {

							favoritos.objetos[k].lookAt( favoritos.posicion[k].x*50, favoritos.posicion[k].y, favoritos.posicion[k].z*50 );
						};						
					}

			function transform( targets, duration ) {

				TWEEN.removeAll();

				for ( var i = 0; i < objects.length; i ++ ) {

					var object = objects[ i ];
					var target = targets[ i ];

					new TWEEN.Tween( object.position )
						.to( { x: target.position.x, y: target.position.y, z: target.position.z }, Math.random() * duration + duration )
						.easing( TWEEN.Easing.Exponential.InOut )
						.start();

					new TWEEN.Tween( object.rotation )
						.to( { x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, Math.random() * duration + duration )
						.easing( TWEEN.Easing.Exponential.InOut )
						.start();

				}

				new TWEEN.Tween( this )
					.to( {}, duration * 2 )
					.onUpdate( render )
					.start();

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );
                renderer2.setSize( window.innerWidth, window.innerHeight );

				render();

			}

			function animate() {

				requestAnimationFrame( animate );

				TWEEN.update();

				controls.update();



			}

			function render() {

				renderer.render( scene, camera );
                renderer2.render( scene, camera );

			}
